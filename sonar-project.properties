sonar.projectKey=harmonyos-app
sonar.projectName=HarmonyOS App
sonar.projectVersion=1.0

# ArkTS source files (.ets = TypeScript-based)
sonar.sources=entry/src/main/ets
sonar.exclusions=**/node_modules/**,**/oh_modules/**,**/build/**

# Include .ets extension (ArkTS = TypeScript variant)
sonar.javascript.file.suffixes=.js,.jsx,.ts,.tsx,.ets

sonar.sourceEncoding=UTF-8
sonar.scm.disabled=true